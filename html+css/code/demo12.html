<!DOCTYPE html>
<html lang="zh_CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            position: relative;
            height: 75vh;
            margin: 0;
            overflow: hidden;
        }

        .chatgpt,
        .gemini,
        .claude,
        .deepseek {
            width: 150px;
            height: 150px;

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            position: absolute;

            left: 50%;
            top: 50%;
        }

        .chatgpt {
            background-image: url(../img/chatgpt.png);
            animation: orbit0 6s linear infinite;
        }

        .gemini {
            background-image: url(../img/gemini.png);
            animation: orbit90 6s linear infinite;
        }

        .claude {
            background-image: url(../img/claude.png);
            animation: orbit180 6s linear infinite;
        }

        .deepseek {
            background-image: url(../img/deepseek.png);
            animation: orbit270 6s linear infinite;
        }

        @keyframes orbit0 {
            from {
                transform:
                    rotate(0deg) translateY(-150px);
            }

            to {
                transform:
                    rotate(360deg) translateY(-150px);
            }
        }

        @keyframes orbit90 {
            from {
                transform:
                    rotate(90deg) translateY(-150px);
            }

            to {
                transform:
                    rotate(450deg) translateY(-150px);
            }
        }

        @keyframes orbit180 {
            from {
                transform:
                    rotate(180deg) translateY(-150px);
            }

            to {
                transform:
                    rotate(540deg) translateY(-150px);
            }
        }

        @keyframes orbit270 {
            from {
                transform:
                    rotate(270deg) translateY(-150px);
            }

            to {
                transform:
                    rotate(630deg) translateY(-150px);
            }
        }
    </style>
</head>

<body>
    <div class="chatgpt"></div>
    <div class="gemini"></div>
    <div class="claude"></div>
    <div class="deepseek"></div>
</body>

</html>
