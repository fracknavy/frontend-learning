<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>青春不常在,抓紧谈恋爱</h3>
    <form>
        <table>
            <tr>
                <td>性别:</td>
                <td>
                    <input type="radio" name="gender">男<input type="radio" name="gender">女<br>
                </td>
            </tr>
            <tr>
                <td>生日:</td>
                <td>
                    <table>
                        <tr>
                            <td><select name="year">  
                                <option value="请选择年份" checked="checked">请选择年份</option>
                                <option value="1990">1990</option>
                                <option value="1991">1991</option>
                                <option value="1992">1992</option>
                            </select></td>
                        <td><select name="month">  
                            <option value="请选择月份" checked="checked">请选择月份</option>
                            <option value="1月">1月</option>
                            <option value="2月">2月</option>
                            <option value="3月">3月</option>
                            <option value="4月">4月</option>
                            <option value="5月">5月</option>
                            <option value="6月">6月</option>
                            <option value="7月">7月</option>
                            <option value="8月">8月</option>
                            <option value="9月">9月</option>
                            <option value="10月">10月</option>
                            <option value="11月">11月</option>
                            <option value="12月">12月</option>
                        </select></td>
                        <td><select name="day">  
                            <option value="请选择日期" checked="checked">请选择日期</option>
                            <option value="1日">1日</option>
                            <option value="2日">2日</option>
                            <option value="3日">3日</option>
                        </select></td>
                    </tr>
                </table>
            </tr>
            <tr>
                <td>所在地区:</td>
                <td><input type="text" name="area"></td>
            </tr>
            <tr>
                <td>婚姻状况:</td>
                <td>
                    <input type="checkbox" name="hunyin" checked="checked">未婚
                    <input type="checkbox" name="hunyin">已婚
                    <input type="checkbox" name="hunyin">离异
                </td>
            </tr>
            <tr>
                <td>学历:</td>
                <td><input type="text" name="xueli"></td>
            </tr>
            <tr>
                <td>喜欢的类型:</td>
                <td>
                    <input type="checkbox" name="type">妩媚的
                    <input type="checkbox" name="type">可爱的
                    <input type="checkbox" name="type">小鲜肉
                    <input type="checkbox" name="type">老腊肉
                    <input type="checkbox" name="type">都喜欢<br>
                </td>
            </tr>
            <tr>
                <td>自我介绍:</td>
                <td><textarea name="intro" cols="30" rows="2"></textarea></td>
            </tr>
            <tr>
                <td></td>
                <td colspan="2" align="left">
                    <input type="submit" value="免费注册">
                </td>
            </tr>
            <tr>
                <td></td>
                <td colspan="2" align="left">
                    <input type="radio" value="我同意注册条款和会员加入标准" checked="checked">我同意注册条款和会员加入标准
                </td>
            </tr>
            <tr>
                <td></td>
                <td colspan="2" align="left">
                    <a href="#">我是会员,立即登录</a>
                </td>
            </tr> 
                <td></td>
                <td colspan="2" align="left">
                    <dl>
                        <dt>我承诺</dt>
                        <dd>年满18周岁,单身</dd>
                        <dd>抱着严肃的态度</dd>
                        <dd>真诚寻找另一半</dd>
                    </dl>
                </td>   
        </table>
    </form>
</body>
</html>
