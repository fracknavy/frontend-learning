<!DOCTYPE html>
<html lang="zh_CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        li {
            list-style: none;
        }

        .container {
            width: 750px;
            background-color: pink;
            margin: 0 auto;
        }

        .container li {
            float: left;
            height: 50px;
            width: 93.75px;
            line-height: 50px;
            text-align: center;
            background-color: green;
            color: #fff;
        }

        @media screen and (max-width: 768px) {
            .container {
                width: 100%;
            }

            .container li {
                width: 33%;
            }
        }

        @media screen and (min-width: 768px) {
            .container {
                width: 750px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <ul>
            <li>1</li>
            <li>2</li>
            <li>3</li>
            <li>4</li>
            <li>5</li>
            <li>6</li>
            <li>7</li>
            <li>8</li>
        </ul>
    </div>

</body>

</html>
