<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(245, 245, 245);
        }

        .box {
            width: 250px;
            height: 160px;
            background-color: rgb(255, 255, 255);
            border: 1px solid rgb(200, 200, 200);
            margin: 20px auto;
        }

        .box h3 {
            color: rgb(0, 0, 0);
            font-size: 14px;
            font-weight: normal;
            width: 100%;
            height: 30px;
            line-height: 30px;
            padding-left: 15px;
        }

        .box ul {
            width: 100%;
            height: 130px;
            border-top: 1px dotted rgb(200, 200, 200);
        }

        li {
            list-style: none;
        }

        .box ul li a {
            height: 20px;
            line-height: 20px;
            color: rgb(0, 0, 0);
            font-size: 12px;
            text-decoration: none;
            padding: 10px 15px;
        }

        .box ul li a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="box">
        <div>
            <h3>品优购快报</h3>
        </div>
        <ul>
            <li><a href="#">[特惠] 爆款耳机5折秒!</a></li>
            <li><a href="#">[特惠] 母亲节,健康好礼低至5折</a></li>
            <li><a href="#">[特惠] 爆款耳机5折秒!</a></li>
            <li><a href="#">[特惠] 9.9元洗100张照片!</a></li>
            <li><a href="#">[特惠] 长虹智能空调立省1000元!</a></li>
        </ul>
    </div>
</body>

</html>
