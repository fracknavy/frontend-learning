<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(245, 245, 245);
            font-family: Microsoft YaHei, sans-serif;
        }

        .wrapper {
            width: 1240px;
            height: 460px;
            margin: 40px auto;
            background-image: url(../img/K90.png);
            background-size: cover;
        }

        .banner {
            width: 234px;
            height: 460px;
            background-color: rgba(107, 101, 99, 0.3);
            float: left;
        }

        .product {
            width: 1006px;
            height: 460px;
            float: left;
            overflow: hidden;
            text-align: center;
        }

        .product img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .category {
            list-style: none;
        }

        .category li a {
            display: block;
            height: 46px;
            line-height: 46px;
            color: rgb(255, 255, 255);
            font-size: 14px;
            text-decoration: none;
            padding-left: 30px;
        }

        .category span {
            color: rgb(255, 255, 255);
            height: 46px;
            line-height: 46px;
            font-size: 14px;
            padding-right: 30px;
            float: right;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="banner">
            <ul class="category">
                <li><a href="#">手机<span>></span></a></li>
                <li><a href="#">电视<span>></span></a></li>
                <li><a href="#">家电<span>></span></a></li>
                <li><a href="#">笔记本 平板 显示器<span>></span></a></li>
                <li><a href="#">出行 穿戴<span>></span></a></li>
                <li><a href="#">耳机 音箱<span>></span></a></li>
                <li><a href="#">健康 儿童<span>></span></a></li>
                <li><a href="#">生活 箱包<span>></span></a></li>
                <li><a href="#">智能 路由器<span>></span></a></li>
                <li><a href="#">电源 配件<span>></span></a></li>
            </ul>
        </div>
        <div class="product">
        </div>

    </div>
</body>

</html>
