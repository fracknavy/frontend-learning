  <script>
    const obj = {
      uname: 'lucky',
      age: 17,
      hobby: ['basketball', 'football'],
      student: {
        id: 2000,
        major: 'yes'
      }
    }
    const o = {}
    //lodash实现深拷贝
    const oo = _.cloneDeep(obj)

    //手动书写递归函数实现深拷贝
    function deecopy(newObj, oldObj) {
      for (let k in oldObj) {
        if (oldObj[k] instanceof Array) {
          newObj[k] = []
          deecopy(newObj[k], oldObj[k])
        } else if (oldObj[k] instanceof Object) {
          newObj[k] = {}
          deecopy(newObj[k], oldObj[k])
        } else {
          newObj[k] = oldObj[k]
        }

      }
    }
    //把对象转换为json字符串

  </script>
