<!DOCTYPE html>
<html lang="zh_CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    h1 {
      text-align: center;
    }

    table {
      margin: 0 auto;
      border-collapse: collapse;
      height: 80px;
      text-align: center;
    }

    table,
    th,
    td {
      border: 1px solid black;
    }

    th {
      padding: 3px 30px;
    }
  </style>
</head>

<body>

  <h1>订单付款确认页面</h1>

  <script>
    let name, price, num, total_price, address
    price = prompt('请输入商品价格')
    num = prompt('请输入商品数量')
    address = prompt('请输入商品收货地址')
    name = '小米手机';
    total_price = num * price;
    document.write(`
      <table>
          <tr>
            <th>商品名称</th>
            <th>商品价格</th>
            <th>商品数量</th>
            <th>总价</th>
            <th>收货地址</th>
          </tr>
          <tr>
            <td>${name}</td>
            <td>${num}</td>
            <td>${price}</td>
            <td>${total_price}</td>
            <td>${address}</td>
          </tr>

        </table>
    `
    )
  </script>
</body>

</html>
