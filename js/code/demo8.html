<!DOCTYPE html>
<html lang="zh_CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    li {
      list-style: none;
    }

    a {
      color: #000;
      text-decoration: none;
    }

    .banner {
      width: 600px;
      height: 300px;
      margin: 0 auto;
      overflow: hidden;
      background: url(../img/1.webp) no-repeat;
      background-size: cover;
    }



    .banner_left {
      width: 100px;
      height: 100%;

    }

    .banner_left ul {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .banner_left ul li {
      flex: 1;
      text-align: center;
      line-height: 50px;
      background-color: rgb(143, 123, 123, 0.3);
    }

    .banner_left ul li:hover {
      background-color: #5a5a5a;
    }

    .banner_right {
      position: relative;
    }

    .banner_right ul {
      height: 15px;
      display: flex;
      position: absolute;
      bottom: 10px;
      right: 10px;
      align-items: center;
    }

    .banner_right ul li {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-left: 10px;
      background-color: #635e5e;

    }

    .banner_right ul li.active {
      width: 15px;
      height: 15px;
      background-color: #575151;
    }
  </style>
</head>

<body>
  <div class="banner">

    <div class="banner_left">
      <ul>
        <li>
          <a href="#">手机</a>
        </li>
        <li>
          <a href="#">手机</a>
        </li>
        <li>
          <a href="#">手机</a>
        </li>
        <li>
          <a href="#">手机</a>
        </li>
        <li>
          <a href="#">手机</a>
        </li>
        <li>
          <a href="#">手机</a>
        </li>
      </ul>
    </div>
    <div class="banner_right">
      <ul>
        <li class="active"></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
      </ul>
    </div>
  </div>
  <script>
    const arr = [{ url: '../img/1.webp' },
    { url: '../img/2.webp' },
    { url: '../img/3.webp' },
    { url: '../img/4.webp' },
    { url: '../img/5.webp' }]

    const banner = document.querySelector('.banner')
    let i = 0
    function fun() {
      i = (i + 1) % arr.length
      banner.style.backgroundImage = `url(${arr[i].url})`
      document.querySelector(`.banner_right .active`).classList.remove('active')
      document.querySelector(`.banner_right ul li:nth-child(${i + 1})`).classList.add('active')

    }
    let a = setInterval(fun, 1000)
  </script>
</body>

</html>
