<!DOCTYPE html>
<html lang="zh_CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    h1 {
      text-align: center;
    }

    ul {
      margin: 0 auto;
      width: 1000px;
      height: 250px;
      display: flex;
      border-left: 1px solid black;
      border-bottom: 1px solid black;
      align-items: flex-end;
      justify-content: space-around;
    }

    li {
      display: flex;
      flex-direction: column;
      text-align: center;
      list-style: none;
      width: 50px;
      background-color: pink;
      justify-content: space-between;
    }

    li span {
      text-align: center;
      margin-top: -20px;
    }
  </style>
</head>

<body>
  <h1>冒泡排序</h1>

  <script>
    function fun(arr) {
      for (let i = 0; i < arr.length - 1; i++) {
        for (let j = 0; j < arr.length - i - 1; j++) {
          if (arr[j] < arr[j + 1]) {
            let temp = arr[j]
            arr[j] = arr[j + 1]
            arr[j + 1] = temp
          }
        }
      }
    }
    let arr = [20, 10, 30, 40, 50, 60, 70, 80, 90, 100]
    /*while (arr.length < 10) {
      let num = +prompt(`请输入第${arr.length + 1}个数字`)
      if (num >= 0 && num <= 100) {
        arr.push(num)
      }
    }*/
    document.write(`<ul>`)
    for (let i = 0; i < arr.length; i++) {
      document.write(` 
      <li style="height: ${arr[i]}px;">
        <span>${arr[i]}</span>
      </li>
      `)
    }
    document.write(`</ul>`)

    fun(arr);
    document.write(`<ul>`)
    for (let i = 0; i < arr.length; i++) {
      document.write(` 
      <li style="height: ${arr[i]}px;">
        <span>${arr[i]}</span>
      </li>
      `)
    }
    document.write(`</ul>`)
  </script>
</body>

</html>
