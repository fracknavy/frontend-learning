<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <script>
    //动态参数
    function getsum() {
      let sum = 0

      for (let i = 0; i < arguments.length; i++) {
        sum += arguments[i]
      }
      console.log(sum)
    }
    getsum(2, 3, 4)

    //剩余参数
    function sum(...arr) {
      let sum = 0

      for (let i = 0; i < arr.length; i++) {
        sum += arr[i]
      }
      console.log(sum)
    }
    sum(2, 3, 4)
    sum(2, 3, 4, 5)
  </script>
</body>

</html>
