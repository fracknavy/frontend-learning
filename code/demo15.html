<!DOCTYPE html>
<html lang="zh_CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龙王</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            perspective: 2000px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #1a1a2e;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 700px;
            height: 700px;
            transform-style: preserve-3d;
        }

        .main-img {
            position: absolute;
            width: 500px;
            height: 500px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -10%);
            background-image: url(../img/nailong.PNG);
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            z-index: 3;
        }

        .halo-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            transform-style: preserve-3d;
            z-index: 1;
        }

        .halo-outer-item {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 50%;
            top: 50%;
            margin: -40px 0 0 -40px;
            background-image: url(../img/nailong.PNG);
            background-size: cover;
            background-position: center;
            opacity: 0.5;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .halo-outer-item:nth-child(1) {
            animation: halo-outer-0 15s linear infinite;
        }

        .halo-outer-item:nth-child(2) {
            animation: halo-outer-45 15s linear infinite;
        }

        .halo-outer-item:nth-child(3) {
            animation: halo-outer-90 15s linear infinite;
        }

        .halo-outer-item:nth-child(4) {
            animation: halo-outer-135 15s linear infinite;
        }

        .halo-outer-item:nth-child(5) {
            animation: halo-outer-180 15s linear infinite;
        }

        .halo-outer-item:nth-child(6) {
            animation: halo-outer-225 15s linear infinite;
        }

        .halo-outer-item:nth-child(7) {
            animation: halo-outer-270 15s linear infinite;
        }

        .halo-outer-item:nth-child(8) {
            animation: halo-outer-315 15s linear infinite;
        }

        @keyframes halo-outer-0 {
            from {
                transform: rotate(0deg) translateY(-400px) rotate(0deg);
            }

            to {
                transform: rotate(360deg) translateY(-400px) rotate(-360deg);
            }
        }

        @keyframes halo-outer-45 {
            from {
                transform: rotate(45deg) translateY(-400px) rotate(-45deg);
            }

            to {
                transform: rotate(405deg) translateY(-400px) rotate(-405deg);
            }
        }

        @keyframes halo-outer-90 {
            from {
                transform: rotate(90deg) translateY(-400px) rotate(-90deg);
            }

            to {
                transform: rotate(450deg) translateY(-400px) rotate(-450deg);
            }
        }

        @keyframes halo-outer-135 {
            from {
                transform: rotate(135deg) translateY(-400px) rotate(-135deg);
            }

            to {
                transform: rotate(495deg) translateY(-400px) rotate(-495deg);
            }
        }

        @keyframes halo-outer-180 {
            from {
                transform: rotate(180deg) translateY(-400px) rotate(-180deg);
            }

            to {
                transform: rotate(540deg) translateY(-400px) rotate(-540deg);
            }
        }

        @keyframes halo-outer-225 {
            from {
                transform: rotate(225deg) translateY(-400px) rotate(-225deg);
            }

            to {
                transform: rotate(585deg) translateY(-400px) rotate(-585deg);
            }
        }

        @keyframes halo-outer-270 {
            from {
                transform: rotate(270deg) translateY(-400px) rotate(-270deg);
            }

            to {
                transform: rotate(630deg) translateY(-400px) rotate(-630deg);
            }
        }

        @keyframes halo-outer-315 {
            from {
                transform: rotate(315deg) translateY(-400px) rotate(-315deg);
            }

            to {
                transform: rotate(675deg) translateY(-400px) rotate(-675deg);
            }
        }

        .halo {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: 0;
            transform-style: preserve-3d;
            z-index: 2;
        }

        .halo-item {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 50%;
            top: 50%;
            margin: -50px 0 0 -50px;
            background-image: url(../img/nailong.PNG);
            background-size: cover;
            background-position: center;
            opacity: 0.7;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .halo-item:nth-child(1) {
            animation: halo-0 10s linear infinite;
        }

        .halo-item:nth-child(2) {
            animation: halo-45 10s linear infinite;
        }

        .halo-item:nth-child(3) {
            animation: halo-90 10s linear infinite;
        }

        .halo-item:nth-child(4) {
            animation: halo-135 10s linear infinite;
        }

        .halo-item:nth-child(5) {
            animation: halo-180 10s linear infinite;
        }

        .halo-item:nth-child(6) {
            animation: halo-225 10s linear infinite;
        }

        .halo-item:nth-child(7) {
            animation: halo-270 10s linear infinite;
        }

        .halo-item:nth-child(8) {
            animation: halo-315 10s linear infinite;
        }

        @keyframes halo-0 {
            from {
                transform: rotate(0deg) translateY(-220px) rotate(0deg);
            }

            to {
                transform: rotate(360deg) translateY(-220px) rotate(-360deg);
            }
        }

        @keyframes halo-45 {
            from {
                transform: rotate(45deg) translateY(-220px) rotate(-45deg);
            }

            to {
                transform: rotate(405deg) translateY(-220px) rotate(-405deg);
            }
        }

        @keyframes halo-90 {
            from {
                transform: rotate(90deg) translateY(-220px) rotate(-90deg);
            }

            to {
                transform: rotate(450deg) translateY(-220px) rotate(-450deg);
            }
        }

        @keyframes halo-135 {
            from {
                transform: rotate(135deg) translateY(-220px) rotate(-135deg);
            }

            to {
                transform: rotate(495deg) translateY(-220px) rotate(-495deg);
            }
        }

        @keyframes halo-180 {
            from {
                transform: rotate(180deg) translateY(-220px) rotate(-180deg);
            }

            to {
                transform: rotate(540deg) translateY(-220px) rotate(-540deg);
            }
        }

        @keyframes halo-225 {
            from {
                transform: rotate(225deg) translateY(-220px) rotate(-225deg);
            }

            to {
                transform: rotate(585deg) translateY(-220px) rotate(-585deg);
            }
        }

        @keyframes halo-270 {
            from {
                transform: rotate(270deg) translateY(-220px) rotate(-270deg);
            }

            to {
                transform: rotate(630deg) translateY(-220px) rotate(-630deg);
            }
        }

        @keyframes halo-315 {
            from {
                transform: rotate(315deg) translateY(-220px) rotate(-315deg);
            }

            to {
                transform: rotate(675deg) translateY(-220px) rotate(-675deg);
            }
        }

        .crown {
            position: absolute;
            width: 100%;
            height: 100%;
            left: 0;
            top: -80px;
            transform-style: preserve-3d;
            z-index: 4;
        }

        .crown-item {
            position: absolute;
            width: 100px;
            height: 100px;
            left: 50%;
            top: 50%;
            margin: -50px 0 0 -50px;
            background-image: url(../img/nailong.PNG);
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 30px rgba(255, 215, 0, 1);
            backface-visibility: hidden;
        }

        .crown-item:nth-child(1) {
            animation: crown-0 8s linear infinite;
        }

        .crown-item:nth-child(2) {
            animation: crown-90 8s linear infinite;
        }

        .crown-item:nth-child(3) {
            animation: crown-180 8s linear infinite;
        }

        .crown-item:nth-child(4) {
            animation: crown-270 8s linear infinite;
        }

        @keyframes crown-0 {
            from {
                transform: rotateY(0deg) translateZ(150px) rotateY(0deg);
            }

            to {
                transform: rotateY(360deg) translateZ(150px) rotateY(-360deg);
            }
        }

        @keyframes crown-90 {
            from {
                transform: rotateY(90deg) translateZ(150px) rotateY(-90deg);
            }

            to {
                transform: rotateY(450deg) translateZ(150px) rotateY(-450deg);
            }
        }

        @keyframes crown-180 {
            from {
                transform: rotateY(180deg) translateZ(150px) rotateY(-180deg);
            }

            to {
                transform: rotateY(540deg) translateZ(150px) rotateY(-540deg);
            }
        }

        @keyframes crown-270 {
            from {
                transform: rotateY(270deg) translateZ(150px) rotateY(-270deg);
            }

            to {
                transform: rotateY(630deg) translateZ(150px) rotateY(-630deg);
            }
        }

        .container:hover .halo-outer-item,
        .container:hover .halo-item,
        .container:hover .crown-item {
            animation-play-state: paused;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="main-img"></div>

        <div class="halo-outer">
            <div class="halo-outer-item"></div>
            <div class="halo-outer-item"></div>
            <div class="halo-outer-item"></div>
            <div class="halo-outer-item"></div>
            <div class="halo-outer-item"></div>
            <div class="halo-outer-item"></div>
            <div class="halo-outer-item"></div>
            <div class="halo-outer-item"></div>
        </div>

        <div class="halo">
            <div class="halo-item"></div>
            <div class="halo-item"></div>
            <div class="halo-item"></div>
            <div class="halo-item"></div>
            <div class="halo-item"></div>
            <div class="halo-item"></div>
            <div class="halo-item"></div>
            <div class="halo-item"></div>
        </div>

        <div class="crown">
            <div class="crown-item"></div>
            <div class="crown-item"></div>
            <div class="crown-item"></div>
            <div class="crown-item"></div>
        </div>
    </div>
</body>

</html>
