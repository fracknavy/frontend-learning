<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>京东移动端首页</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="page">
        <header class="jd-app">
            <button class="jd-app__close" type="button" aria-label="关闭">
                <img src="images/10022.png" alt="">
            </button>
            <img class="jd-app__logo" src="images/10001.png" alt="京东">
            <div class="jd-app__copy">
                <p>京东购物，又好又便宜</p>
                <span>品质外卖&酒店 就上京东</span>
            </div>
            <a class="jd-app__button" href="#">立即打开</a>
        </header>

        <main>
            <section class="top-area">
                <div class="search">
                    <button class="search__menu" type="button" aria-label="菜单">
                        <img src="images/10029.png" alt="">
                    </button>
                    <a class="search__box" href="#">
                        <img class="search__jd" src="images/10031.png" alt="京东">
                        <span class="search__line"></span>
                        <img class="search__icon" src="images/10032.png" alt="">
                        <span class="search__placeholder">又好又便宜</span>
                    </a>
                    <a class="search__login" href="#">登录</a>
                </div>

                <div class="hero-card">
                    <img class="hero-card__bg" src="images/10034.png" alt="">
                    <div class="hero-card__content">
                        <img src="images/10035.png" alt="京东秒杀">
                        <p>整点开抢 低价好物限时放送</p>
                    </div>
                    <div class="hero-card__dots">
                        <i></i>
                        <i></i>
                        <i></i>
                    </div>
                </div>
            </section>

            <nav class="channel-grid" aria-label="频道导航">
                <a href="#"><img src="images/10002.png" alt=""><span>京东超市</span></a>
                <a href="#"><img src="images/10003.png" alt=""><span>京东电器</span></a>
                <a href="#"><img src="images/10004.png" alt=""><span>服饰美妆</span></a>
                <a href="#"><img src="images/10005.png" alt=""><span>充值中心</span></a>
                <a href="#"><img src="images/10006.png" alt=""><span>PLUS会员</span></a>
                <a href="#"><img src="images/10007.png" alt=""><span>京东生鲜</span></a>
                <a href="#"><img src="images/10008.png" alt=""><span>京东国际</span></a>
                <a href="#"><img src="images/10009.png" alt=""><span>京东拍卖</span></a>
                <a href="#"><img src="images/10010.png" alt=""><span>红包惊喜</span></a>
                <a href="#"><img src="images/10011.png" alt=""><span>全部</span></a>
            </nav>

            <section class="seckill">
                <div class="section-title">
                    <div>
                        <h2>限时低价</h2>
                        <span>10点场 爆款秒杀</span>
                    </div>
                    <a href="#">去抢购 <img src="images/10040.png" alt=""></a>
                </div>
                <div class="seckill__list">
                    <a class="seckill__item" href="#"><img src="images/10012.jpg" alt=""><strong>¥37.9</strong></a>
                    <a class="seckill__item" href="#"><img src="images/10013.jpg" alt=""><strong>¥29.7</strong></a>
                    <a class="seckill__item" href="#"><img src="images/10014.jpg" alt=""><strong>¥59.8</strong></a>
                    <a class="seckill__item" href="#"><img src="images/10015.jpg" alt=""><strong>¥16.17</strong></a>
                    <a class="seckill__item" href="#"><img src="images/10016.jpg" alt=""><strong>¥377.99</strong></a>
                    <a class="seckill__item" href="#"><img src="images/10017.jpg" alt=""><strong>¥106</strong></a>
                </div>
            </section>

            <section class="promo">
                <a class="promo__main" href="#">
                    <img src="images/10036.png" alt="">
                    <div>
                        <h2>百亿补贴</h2>
                        <p>大牌正品 直接补</p>
                    </div>
                </a>
                <div class="promo__side">
                    <a href="#">
                        <h3>京东新品</h3>
                        <p>尖货尝鲜</p>
                        <img src="images/10018.jpg" alt="">
                    </a>
                    <a href="#">
                        <h3>领券中心</h3>
                        <p>今日福利</p>
                        <img src="images/10019.jpg" alt="">
                    </a>
                </div>
            </section>

            <section class="recommend">
                <div class="recommend__heading">
                    <h2>为你推荐</h2>
                    <span>猜你喜欢</span>
                </div>
                <div class="goods">
                    <a class="goods-card" href="#">
                        <img src="images/10020.jpg" alt="">
                        <p>京东自营品质好物，家用囤货放心选</p>
                        <strong>¥74</strong>
                    </a>
                    <a class="goods-card" href="#">
                        <img src="images/10021.jpg" alt="">
                        <p>爆款精选，低价到手，日常购物更省心</p>
                        <strong>¥17.6</strong>
                    </a>
                </div>
            </section>
        </main>

        <footer class="tabbar">
            <a class="tabbar__item tabbar__item--active" href="#"><img src="images/10024.png" alt="首页"></a>
            <a class="tabbar__item" href="#"><img src="images/10025.png" alt="分类"></a>
            <a class="tabbar__item" href="#"><img src="images/10026.png" alt="购物车"></a>
            <a class="tabbar__item" href="#"><img src="images/10027.png" alt="未登录"></a>
        </footer>
    </div>
</body>

</html>
